<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartBus AI Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(
135deg,
#0f172a,
#1e293b
);

}

.login-card{

width:420px;

background:#111827;

padding:40px;

border-radius:20px;

border:1px solid #334155;

box-shadow:0 10px 30px rgba(0,0,0,0.5);

text-align:center;

}

.login-card h1{

color:white;

margin-bottom:10px;

font-size:34px;

}

.login-card p{

color:#94a3b8;

margin-bottom:25px;

}

.login-card input{

width:100%;

padding:14px;

margin:10px 0;

border:none;

outline:none;

border-radius:12px;

background:#1e293b;

color:white;

border:1px solid #334155;

font-size:15px;

}

.login-card button{

width:100%;

padding:14px;

margin-top:15px;

background:#2563eb;

color:white;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:bold;

transition:0.3s;

}

.login-card button:hover{

background:#1d4ed8;

transform:translateY(-2px);

}

.footer{

margin-top:20px;

color:#64748b;

font-size:13px;

}

</style>

</head>

<body>

<div class="login-card">

<h1>🚌 SmartBus AI</h1>

<p>
University Transport Management System
</p>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
🔐 Login
</button>

<div class="footer">
SmartBus AI © 2026
</div>

</div>

<script>

function login(){

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

if(user=="" || pass==""){

alert("Please Fill All Fields");

return;

}

localStorage.setItem(
"loggedIn",
"true"
);

localStorage.setItem(
"username",
user
);

window.location.href =
"index.html";

}

</script>

</body>
</html>
